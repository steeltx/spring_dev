<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario proyecto</title>
</head>
<body>
    <h1>Formulario de proyecto</h1>
    <form th:action="@{/projects/save}" th:object="${projectDto}" method="post" enctype="multipart/form-data">
        <div>
            <label for="title">Titulo: </label>
            <input type="text" id="title" th:field="*{title}" required>
        </div>
        <div>
            <label for="description">Descripción:</label>
            <textarea id="description" th:field="*{description}"></textarea>
        </div>
        <div>
            <label for="projectUrl">Url del proyecto</label>
            <input type="url" id="projectUrl" th:field="*{projectUrl}">
        </div>
        <div>
            <label for="file">Imagen del proyecto</label>
            <input type="file" name="file" id="file" required>
        </div>
        <div>
            <label for="personalInfoId">ID información Personal</label>
            <input type="number" id="personalInfoId" th:field="*{personalInfoId}" required>
        </div>
        <button type="submit">Guardar</button>
    </form>
</body>
</html>
